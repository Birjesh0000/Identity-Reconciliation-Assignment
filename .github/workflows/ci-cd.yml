name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [14.x, 16.x, 18.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check syntax - server.js
      run: node -c src/server.js
    
    - name: Verify models can be required
      run: node -e "require('dotenv').config(); require('./src/models/Contact'); console.log('✅ Models OK')"
    
    - name: Verify utils can be required
      run: node -e "require('dotenv').config(); require('./src/utils/validation'); require('./src/utils/errors'); require('./src/utils/logger'); console.log('✅ Utils OK')"
    
    - name: Verify package.json is valid
      run: node -e "const pkg = require('./package.json'); if (!pkg.main || !pkg.scripts.start) throw new Error('Invalid package.json'); console.log('✅ package.json OK')"
    
    - name: Run security audit
      run: npm audit --audit-level=moderate || true

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    
    - name: Check for unused dependencies
      run: |
        npm ls --prod 2>&1 | grep -E "(peer|missing)" || echo "✓ No missing dependencies"

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true

  deploy:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Render
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
          echo "Render deployment secrets not configured"
          echo "To enable deployment:"
          echo "1. Get API key from Render.com settings"
          echo "2. Get Service ID from your Render service"
          echo "3. Add them as GitHub secrets: RENDER_API_KEY, RENDER_SERVICE_ID"
          exit 0
        fi
        
        curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
          -H "Authorization: Bearer $RENDER_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"clearCache":"do_not_clear"}'
